version: '3.9'
services:
  backend:
    # Optional: set BACKEND_PLATFORM=linux/amd64 to force arch on ARM Macs
    platform: ${BACKEND_PLATFORM:-}
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      - ROUTING_PROVIDER=${ROUTING_PROVIDER:-straight}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - STRICT_DEV_INVARIANTS=${STRICT_DEV_INVARIANTS:-0}
      - OSRM_URL=${OSRM_URL:-https://router.project-osrm.org}
      - TRAFFIC_FALLBACK_MULTIPLIER=${TRAFFIC_FALLBACK_MULTIPLIER:-1.15}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_BASE=/api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

networks:
  default:
    name: truck-optimize
